<!DOCTYPE html>
<html>
<body>

<h2>Your Invite Link:</h2>
<div id="myid"></div>

<input id="target" placeholder="Paste Invite Link or ID">
<button id="connect">Connect</button>

<button id="send">Close Window</button>
<button id="send2">Block Screen</button>

<button id="shareScreen">Share Screen</button>

<video id="screenVideo"
autoplay
playsinline
style="width:500px;border:1px solid black">
</video>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

const peer = new Peer();

let conn;
let currentCall;

/* -------------------- INVITE LINK -------------------- */
peer.on('open', (id) => {

    const link =
        `${location.href.split('?')[0]}?id=${id}`;

    document.getElementById('myid').innerHTML =
        `<input value="${link}" style="width:100%">`;

});

/* -------------------- AUTO CONNECT -------------------- */
const params = new URLSearchParams(location.search);
const autoId = params.get("id");

if (autoId) {

    setTimeout(() => {
        connectTo(autoId);
    }, 500);

}

/* -------------------- MANUAL CONNECT -------------------- */
document.getElementById('connect').onclick = () => {

    let input =
        document.getElementById('target').value.trim();

    let targetId =
        input.includes("id=")
            ? new URL(input).searchParams.get("id")
            : input;

    connectTo(targetId);

};

/* -------------------- CONNECT FUNCTION -------------------- */
function connectTo(id) {

    conn = peer.connect(id);

    conn.on('open', () => {
        setupConnection();
    });

}

/* -------------------- RECEIVE SCREEN -------------------- */
peer.on('call', (call) => {

    currentCall = call;

    call.answer();

    call.on('stream', (remoteStream) => {

        document.getElementById('screenVideo')
            .srcObject = remoteStream;

    });

});

/* -------------------- REQUEST SCREEN SHARE -------------------- */
document.getElementById('shareScreen').onclick = () => {

    if (!conn || !conn.open) {
        alert("Connect first");
        return;
    }

    conn.send({ type: 'startScreenShare' });

};

/* -------------------- CONNECTION HANDLER -------------------- */
function setupConnection() {

    conn.on('data', (data) => {

        /* CLOSE WINDOW */
        if (data.type === 'close') {
            alert("Close requested");
        }

        /* BLOCK SCREEN */
        if (data.type === 'block') {

            const tab = window.open("", "_blank");

            tab.document.write(`
<!DOCTYPE html>
<html>
<body style="
margin:0;
background:black;
overflow:hidden;
">
<h1 style="
color:white;
font-family:sans-serif;
text-align:center;
margin-top:40vh;
">
SCREEN BLOCKED
</h1>
</body>
</html>
            `);

        }

        /* SCREEN SHARE REQUEST */
        if (data.type === 'startScreenShare') {

            navigator.mediaDevices.getDisplayMedia({
                video: true,
                audio: false
            })
            .then((stream) => {

                currentCall = peer.call(conn.peer, stream);

            })
            .catch(err => {
                console.log("Screen share cancelled", err);
            });

        }

    });

}

/* -------------------- CLOSE -------------------- */
document.getElementById('send').onclick = () => {
    if (conn) conn.send({ type: 'close' });
};

/* -------------------- BLOCK -------------------- */
document.getElementById('send2').onclick = () => {
    if (conn) conn.send({ type: 'block' });
};

</script>

</body>
</html>
