<!DOCTYPE html>
<html>
<body>

<h2>Your Invite Link:</h2>
<div id="myid"></div>

<input id="target" placeholder="Paste Invite Link or ID">
<button id="connect">Connect</button>

<button id="send">Close Window</button>
<button id="send2">Block Screen</button>

<button id="shareScreen">Share Screen</button>

<video id="screenVideo"
autoplay
playsinline
style="width:500px;border:1px solid black">
</video>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script>

const peer = new Peer();

let conn;
let currentCall;

// SHOW FRIENDLY INVITE LINK
peer.on('open', (id) => {

    const link =
        `${location.href.split('?')[0]}?id=${id}`;

    document.getElementById('myid').innerHTML =
        `<input value="${link}" style="width:100%">`;

});

// AUTO CONNECT IF LINK USED
const params = new URLSearchParams(location.search);
const autoId = params.get("id");

if (autoId) {

    setTimeout(() => {

        conn = peer.connect(autoId);

        setupConnection();

    }, 500);

}

// MANUAL CONNECT
document.getElementById('connect').onclick = () => {

    let input =
        document.getElementById('target').value.trim();

    let targetId;

    if (input.includes("id=")) {

        targetId =
            new URL(input).searchParams.get("id");

    } else {

        targetId = input;

    }

    conn = peer.connect(targetId);

    setupConnection();

};

// RECEIVE DATA CONNECTION
peer.on('connection', (connection) => {

    conn = connection;

    setupConnection();

});

// RECEIVE SCREEN SHARE CALL
peer.on('call', (call) => {

    currentCall = call;

    call.answer();

    call.on('stream', (remoteStream) => {

        document.getElementById('screenVideo')
            .srcObject = remoteStream;

    });

});

// START SCREEN SHARE
document.getElementById('shareScreen').onclick =
async () => {

    if (!conn) {
        alert("Connect first");
        return;
    }

    const stream =
        await navigator.mediaDevices.getDisplayMedia({
            video: true,
            audio: false
        });

    document.getElementById('screenVideo')
        .srcObject = stream;

    currentCall = peer.call(conn.peer, stream);

};

// DATA MESSAGE HANDLING
function setupConnection() {

    conn.on('data', (data) => {

        // CLOSE WINDOW
        if (data.type === 'close') {

            alert("Close requested");

        }

        // BLOCK SCREEN
        if (data.type === 'block') {

            const tab =
                window.open("", "_blank");

            tab.document.write(`
<!DOCTYPE html>
<html>
<body style="
margin:0;
background:black;
overflow:hidden;
">
<h1 style="
color:white;
font-family:sans-serif;
text-align:center;
margin-top:40vh;
">
SCREEN BLOCKED
</h1>
</body>
</html>
            `);

        }

    });

}

// SEND CLOSE
document.getElementById('send').onclick = () => {

    conn.send({
        type: 'close'
    });

};

// SEND BLOCK
document.getElementById('send2').onclick = () => {

    conn.send({
        type: 'block'
    });

};

</script>

</body>
</html>
